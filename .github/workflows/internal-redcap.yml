name: Internal REDCap Check

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  redcap-internal:
    runs-on: [self-hosted, linux, internal]
    timeout-minutes: 2

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check internal REDCap
        id: check
        shell: bash
        run: |
          set -euo pipefail
          URL="http://redcap-crsm.comtl.rtss.qc.ca/"
          TS="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          # Get HTTP status code (000 if curl couldn't connect)
          CODE="$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo 000)"

          # Export for later steps
          echo "ts=$TS" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

          # Log locally in repo
          mkdir -p history/internal
          echo "$TS $CODE $URL" >> history/internal/redcap.log

          # Fail job if not 2xx/3xx
          if [ "$CODE" -ge 200 ] && [ "$CODE" -lt 400 ]; then
            echo "REDCap OK ($CODE)"
          else
            echo "REDCap DOWN ($CODE)"
            exit 1
          fi

      - name: Push UP heartbeat to cloud2 (on success)
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          TS="${{ steps.check.outputs.ts }}"
          CODE="${{ steps.check.outputs.code }}"

          ssh -o StrictHostKeyChecking=accept-new beatom@cloud2.douglasneuroinformatics.ca \
            "cat > /opt/internal_server_heartbeats/smrc-redcap.json" <<EOF
          {
            "service": "smrc-redcap",
            "status": "up",
            "http_code": "${CODE}",
            "last_check": "${TS}"
          }
          EOF

      - name: Push DOWN heartbeat to cloud2 (on failure)
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          TS="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          ssh -o StrictHostKeyChecking=accept-new beatom@cloud2.douglasneuroinformatics.ca \
            "cat > /opt/internal_server_heartbeats/smrc-redcap.json" <<EOF
          {
            "service": "smrc-redcap",
            "status": "down",
            "last_check": "${TS}"
          }
          EOF

      - name: Commit result log
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "Upptime Internal Runner"
          git config user.email "upptime-internal@users.noreply.github.com"

          git add history/internal/redcap.log
          git diff --staged --quiet || git commit -m "internal: REDCap check"
          git push
