name: Internal REDCap Check

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: internal-redcap
  cancel-in-progress: true

jobs:
  redcap-internal:
    runs-on: [self-hosted, linux, internal]
    timeout-minutes: 2

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  #required for rebase at the end

      - name: Check internal REDCap
        id: check
        shell: bash
        run: |
          set -euo pipefail
          URL="http://redcap-crsm.comtl.rtss.qc.ca/"
          TS="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          CODE="$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo 000)"

          echo "ts=$TS" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

          mkdir -p history/internal
          echo "$TS $CODE $URL" >> history/internal/redcap.log

          if [ "$CODE" -ge 200 ] && [ "$CODE" -lt 400 ]; then
            echo "REDCap OK ($CODE)"
          else
            echo "REDCap DOWN ($CODE)"
            exit 1
          fi

      - name: Push heartbeat up to cloud2 (success)
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          TS="${{ steps.check.outputs.ts }}"
          CODE="${{ steps.check.outputs.code }}"

          ssh -o StrictHostKeyChecking=accept-new beatom@cloud2.douglasneuroinformatics.ca \
            "cat > /opt/internal_server_heartbeats/smrc-redcap.json" <<EOF
          {
            "service": "smrc-redcap",
            "status": "up",
            "http_code": "${CODE}",
            "last_check": "${TS}"
          }
          EOF

      - name: Push heartbeat down to cloud2 (failure)
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          TS="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          ssh -o StrictHostKeyChecking=accept-new beatom@cloud2.douglasneuroinformatics.ca \
            "cat > /opt/internal_server_heartbeats/smrc-redcap.json" <<EOF
          {
            "service": "smrc-redcap",
            "status": "down",
            "last_check": "${TS}"
          }
          EOF

      - name: Commit + push result log
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "Upptime Internal Runner"
          git config user.email "upptime-internal@users.noreply.github.com"

          git add history/internal/redcap.log
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "internal: REDCap check"

          #avoid non-fast-forward github failures
          git fetch origin master
          git rebase origin/master

          git push origin HEAD:master
